name: build-tree-sitter-centos7

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build in CentOS7
        run: |
          docker run --rm \
            -v "${GITHUB_WORKSPACE}:/work" \
            -w /work \
            centos:7 \
            /bin/bash -c '
              set -euo pipefail

              rm -f /etc/yum.repos.d/*.repo

              printf "%s\n" \
                "[base]" \
                "name=CentOS-7 Base" \
                "baseurl=http://vault.centos.org/7.9.2009/os/x86_64/" \
                "enabled=1" \
                "gpgcheck=0" \
                "" \
                "[updates]" \
                "name=CentOS-7 Updates" \
                "baseurl=http://vault.centos.org/7.9.2009/updates/x86_64/" \
                "enabled=1" \
                "gpgcheck=0" \
                "" \
                "[extras]" \
                "name=CentOS-7 Extras" \
                "baseurl=http://vault.centos.org/7.9.2009/extras/x86_64/" \
                "enabled=1" \
                "gpgcheck=0" \
                > /etc/yum.repos.d/CentOS-Base.repo

              printf "%s\n" \
                "[centos-sclo-rh]" \
                "name=CentOS-7 SCLo rh" \
                "baseurl=http://vault.centos.org/7.9.2009/sclo/x86_64/rh/" \
                "enabled=1" \
                "gpgcheck=0" \
                "" \
                "[centos-sclo-sclo]" \
                "name=CentOS-7 SCLo sclo" \
                "baseurl=http://vault.centos.org/7.9.2009/sclo/x86_64/sclo/" \
                "enabled=1" \
                "gpgcheck=0" \
                > /etc/yum.repos.d/CentOS-SCLo.repo

              yum clean all
              yum makecache

              yum -y install \
                curl \
                git \
                make \
                which \
                findutils \
                file \
                ca-certificates \
                gcc \
                gcc-c++ \
                llvm-toolset-7-clang \
                llvm-toolset-7-llvm \
                llvm-toolset-7-llvm-devel \
                devtoolset-7-gcc \
                devtoolset-7-gcc-c++

              curl https://sh.rustup.rs -sSf | sh -s -- -y
              source /root/.cargo/env

              if [ -f /opt/rh/llvm-toolset-7/enable ]; then
                source /opt/rh/llvm-toolset-7/enable
              fi
              if [ -f /opt/rh/devtoolset-7/enable ]; then
                source /opt/rh/devtoolset-7/enable
              fi

              LIBCLANG_SO=$(find /opt /usr -name "libclang.so*" 2>/dev/null | head -n 1 || true)
              if [ -z "${LIBCLANG_SO}" ]; then
                echo "libclang.so not found"
                exit 1
              fi
              export LIBCLANG_PATH="$(dirname "${LIBCLANG_SO}")"

              export CC="${CC:-clang}"
              export CXX="${CXX:-g++}"
              export CFLAGS="-std=gnu99"
              export CXXFLAGS=""

              rustc --version
              cargo --version
              ${CC} --version || true
              ${CXX} --version || true
              echo "LIBCLANG_PATH=${LIBCLANG_PATH}"

              cargo install \
                tree-sitter-cli \
                --version 0.24.7 \
                --locked \
                --root /tmp/tree-sitter-root

              mkdir -p /work/dist
              cp /tmp/tree-sitter-root/bin/tree-sitter /work/dist/tree-sitter-linux-x86_64-centos7
              chmod +x /work/dist/tree-sitter-linux-x86_64-centos7

              file /work/dist/tree-sitter-linux-x86_64-centos7
              ldd /work/dist/tree-sitter-linux-x86_64-centos7 || true
              strings /work/dist/tree-sitter-linux-x86_64-centos7 | grep GLIBC_ | sort -u || true

              cd /work/dist
              tar -czf tree-sitter-linux-x86_64-centos7.tar.gz tree-sitter-linux-x86_64-centos7
              sha256sum tree-sitter-linux-x86_64-centos7.tar.gz > tree-sitter-linux-x86_64-centos7.tar.gz.sha256
            '

      - name: Upload Artifact
        uses: actions/upload-artifact@v5
        with:
          name: tree-sitter-centos7
          path: dist/*

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" --generate-notes || true
          gh release upload "${GITHUB_REF_NAME}" dist/* --clobber
