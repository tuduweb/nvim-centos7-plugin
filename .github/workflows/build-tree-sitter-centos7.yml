- name: Build tree-sitter CLI in CentOS 7 container
  run: |
    docker run --rm \
      -v "${GITHUB_WORKSPACE}:/work" \
      -w /work \
      centos:7 \
      bash -lc '
        set -euo pipefail

        # Base repos
        cat >/etc/yum.repos.d/CentOS-Base.repo <<'"'"'EOF'"'"'
[base]
name=CentOS-7 - Base
baseurl=http://vault.centos.org/7.9.2009/os/x86_64/
gpgcheck=0
enabled=1

[updates]
name=CentOS-7 - Updates
baseurl=http://vault.centos.org/7.9.2009/updates/x86_64/
gpgcheck=0
enabled=1

[extras]
name=CentOS-7 - Extras
baseurl=http://vault.centos.org/7.9.2009/extras/x86_64/
gpgcheck=0
enabled=1
EOF

        yum clean all
        yum makecache

        yum -y install centos-release-scl

        # SCLo repos
        cat >/etc/yum.repos.d/CentOS-SCLo-scl.repo <<'"'"'EOF'"'"'
[centos-sclo-rh]
name=CentOS-7 - SCLo rh
baseurl=http://vault.centos.org/7.9.2009/sclo/x86_64/rh/
gpgcheck=0
enabled=1

[centos-sclo-sclo]
name=CentOS-7 - SCLo sclo
baseurl=http://vault.centos.org/7.9.2009/sclo/x86_64/sclo/
gpgcheck=0
enabled=1
EOF

        yum clean all
        yum makecache

        yum -y install \
          curl \
          git \
          tar \
          gzip \
          zip \
          unzip \
          which \
          make \
          gcc \
          gcc-c++ \
          file \
          ca-certificates \
          findutils \
          llvm-toolset-7 \
          llvm-toolset-7-clang \
          llvm-toolset-7-llvm \
          llvm-toolset-7-llvm-devel

        curl https://sh.rustup.rs -sSf | sh -s -- -y
        source /root/.cargo/env

        if [ -f /opt/rh/llvm-toolset-7/enable ]; then
          source /opt/rh/llvm-toolset-7/enable
        fi

        LIBCLANG_CANDIDATE=$(find /opt /usr -name "libclang.so*" 2>/dev/null | head -n 1 || true)
        test -n "${LIBCLANG_CANDIDATE}"
        export LIBCLANG_PATH=$(dirname "${LIBCLANG_CANDIDATE}")

        cargo install tree-sitter-cli --locked --root /tmp/tree-sitter-root

        mkdir -p /work/dist
        cp /tmp/tree-sitter-root/bin/tree-sitter /work/dist/tree-sitter-linux-x86_64-centos7
        chmod +x /work/dist/tree-sitter-linux-x86_64-centos7

        cd /work/dist
        tar -czf tree-sitter-linux-x86_64-centos7.tar.gz tree-sitter-linux-x86_64-centos7
        sha256sum tree-sitter-linux-x86_64-centos7.tar.gz > tree-sitter-linux-x86_64-centos7.tar.gz.sha256
      '
