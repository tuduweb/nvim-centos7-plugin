name: build-tree-sitter-centos7

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build in CentOS7
        run: |
          docker run --rm \
            -v "${GITHUB_WORKSPACE}:/work" \
            -w /work \
            centos:7 \
            /bin/bash -c '
              set -euo pipefail

              rm -f /etc/yum.repos.d/*.repo

              printf "%s\n" \
                "[base]" \
                "name=CentOS-7 Base" \
                "baseurl=http://vault.centos.org/7.9.2009/os/x86_64/" \
                "enabled=1" \
                "gpgcheck=0" \
                "" \
                "[updates]" \
                "name=CentOS-7 Updates" \
                "baseurl=http://vault.centos.org/7.9.2009/updates/x86_64/" \
                "enabled=1" \
                "gpgcheck=0" \
                "" \
                "[extras]" \
                "name=CentOS-7 Extras" \
                "baseurl=http://vault.centos.org/7.9.2009/extras/x86_64/" \
                "enabled=1" \
                "gpgcheck=0" \
                > /etc/yum.repos.d/CentOS-Base.repo

              yum clean all
              yum makecache

              yum -y install centos-release-scl

              printf "%s\n" \
                "[centos-sclo-rh]" \
                "name=CentOS-7 SCLo rh" \
                "baseurl=http://vault.centos.org/7.9.2009/sclo/x86_64/rh/" \
                "enabled=1" \
                "gpgcheck=0" \
                "" \
                "[centos-sclo-sclo]" \
                "name=CentOS-7 SCLo sclo" \
                "baseurl=http://vault.centos.org/7.9.2009/sclo/x86_64/sclo/" \
                "enabled=1" \
                "gpgcheck=0" \
                > /etc/yum.repos.d/CentOS-SCLo.repo

              yum clean all
              yum makecache

              yum -y install \
                curl \
                git \
                make \
                gcc \
                gcc-c++ \
                which \
                findutils \
                llvm-toolset-7 \
                llvm-toolset-7-clang \
                llvm-toolset-7-llvm \
                llvm-toolset-7-llvm-devel

              curl https://sh.rustup.rs -sSf | sh -s -- -y
              source /root/.cargo/env
              source /opt/rh/llvm-toolset-7/enable

              export LIBCLANG_PATH=$(dirname $(find /opt -name "libclang.so*" | head -n 1))

              cargo install tree-sitter-cli --locked --root /tmp/tree-sitter-root

              mkdir -p /work/dist
              cp /tmp/tree-sitter-root/bin/tree-sitter /work/dist/tree-sitter-linux-x86_64-centos7

              cd /work/dist
              tar -czf tree-sitter-linux-x86_64-centos7.tar.gz tree-sitter-linux-x86_64-centos7
            '

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tree-sitter-centos7
          path: dist/*
