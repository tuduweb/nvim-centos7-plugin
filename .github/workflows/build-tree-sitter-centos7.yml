name: build-tree-sitter-centos7

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Build in CentOS 7 container
        run: |
          docker run --rm \
            -v "$GITHUB_WORKSPACE:/work" \
            -w /work \
            centos:7 \
            bash -lc '
              set -e

              sed -i "s/^mirrorlist=/#mirrorlist=/g" /etc/yum.repos.d/CentOS-*.repo
              sed -i "s|^#baseurl=http://mirror.centos.org|baseurl=http://vault.centos.org|g" /etc/yum.repos.d/CentOS-*.repo
              yum clean all
              yum makecache

              yum -y install curl git tar gzip zip unzip which make gcc gcc-c++ file ca-certificates
              curl https://sh.rustup.rs -sSf | sh -s -- -y
              source /root/.cargo/env

              cargo build -p tree-sitter-cli --release

              mkdir -p dist
              cp target/release/tree-sitter dist/tree-sitter-linux-x86_64-centos7
              chmod +x dist/tree-sitter-linux-x86_64-centos7
              cd dist
              tar -czf tree-sitter-linux-x86_64-centos7.tar.gz tree-sitter-linux-x86_64-centos7
              sha256sum tree-sitter-linux-x86_64-centos7.tar.gz > tree-sitter-linux-x86_64-centos7.tar.gz.sha256
            '

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tree-sitter-linux-x86_64-centos7
          path: dist/*

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" --title "${GITHUB_REF_NAME}" --generate-notes

      - name: Upload release assets
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${GITHUB_REF_NAME}" \
            dist/tree-sitter-linux-x86_64-centos7.tar.gz \
            dist/tree-sitter-linux-x86_64-centos7.tar.gz.sha256 \
            --clobber
