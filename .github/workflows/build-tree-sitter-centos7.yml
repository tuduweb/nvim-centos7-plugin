name: build-tree-sitter-centos7

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Build tree-sitter CLI in CentOS 7 container
        run: |
          docker run --rm \
            -v "${GITHUB_WORKSPACE}:/work" \
            -w /work \
            centos:7 \
            bash -lc '
              set -euo pipefail

              # Fix CentOS 7 EOL repos
              sed -i "s/^mirrorlist=/#mirrorlist=/g" /etc/yum.repos.d/CentOS-*.repo
              sed -i "s|^#baseurl=http://mirror.centos.org|baseurl=http://vault.centos.org|g" /etc/yum.repos.d/CentOS-*.repo

              # SCL repo
              yum -y install centos-release-scl || true
              yum clean all
              yum makecache

              # Base packages
              yum -y install \
                curl \
                git \
                tar \
                gzip \
                zip \
                unzip \
                which \
                make \
                gcc \
                gcc-c++ \
                file \
                ca-certificates \
                findutils

              # LLVM / Clang for bindgen
              yum -y install \
                llvm-toolset-7 \
                llvm-toolset-7-clang \
                llvm-toolset-7-llvm \
                llvm-toolset-7-llvm-devel || true

              # Fallback check
              find / -name "libclang.so*" 2>/dev/null || true

              # Rust
              curl https://sh.rustup.rs -sSf | sh -s -- -y
              source /root/.cargo/env

              # Enable newer toolchain if present
              if [ -f /opt/rh/llvm-toolset-7/enable ]; then
                source /opt/rh/llvm-toolset-7/enable
              fi

              # Locate libclang
              LIBCLANG_CANDIDATE=$(find /opt /usr -name "libclang.so*" 2>/dev/null | head -n 1 || true)
              if [ -z "${LIBCLANG_CANDIDATE}" ]; then
                echo "libclang not found"
                exit 1
              fi

              export LIBCLANG_PATH=$(dirname "${LIBCLANG_CANDIDATE}")
              echo "LIBCLANG_PATH=${LIBCLANG_PATH}"

              rustc --version
              cargo --version
              clang --version || true

              cargo install tree-sitter-cli --locked --root /tmp/tree-sitter-root

              mkdir -p /work/dist
              cp /tmp/tree-sitter-root/bin/tree-sitter /work/dist/tree-sitter-linux-x86_64-centos7
              chmod +x /work/dist/tree-sitter-linux-x86_64-centos7

              file /work/dist/tree-sitter-linux-x86_64-centos7
              ldd /work/dist/tree-sitter-linux-x86_64-centos7 || true
              strings /work/dist/tree-sitter-linux-x86_64-centos7 | grep GLIBC_ | sort -u || true

              cd /work/dist
              tar -czf tree-sitter-linux-x86_64-centos7.tar.gz tree-sitter-linux-x86_64-centos7
              sha256sum tree-sitter-linux-x86_64-centos7.tar.gz > tree-sitter-linux-x86_64-centos7.tar.gz.sha256
            '

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: tree-sitter-linux-x86_64-centos7
          path: dist/*

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes

      - name: Upload release assets
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${GITHUB_REF_NAME}" \
            dist/tree-sitter-linux-x86_64-centos7.tar.gz \
            dist/tree-sitter-linux-x86_64-centos7.tar.gz.sha256 \
            --clobber
